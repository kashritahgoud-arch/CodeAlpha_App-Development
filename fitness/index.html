<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Fitness Tracker</title>
<style>
body {
  font-family: Arial, sans-serif;
  background: #f5f7fa;
  margin: 0;
  display: flex;
  justify-content: center;
}

.container {
  width: 400px;
  padding: 20px;
}

h1 {
  text-align: center;
}

.card {
  background: white;
  padding: 15px;
  margin: 15px 0;
  border-radius: 10px;
  box-shadow: 0 3px 8px rgba(0,0,0,0.1);
}

input {
  width: 100%;
  margin: 5px 0;
  padding: 8px;
}

button {
  width: 100%;
  padding: 10px;
  background: #28a745;
  color: white;
  border: none;
  margin-top: 10px;
  cursor: pointer;
}

button:hover {
  background: #218838;
}

.progress {
  margin-top: 10px;
}

.bar {
  width: 100%;
  height: 10px;
  background: #ddd;
  border-radius: 5px;
}

.bar div {
  height: 100%;
  width: 0%;
  background: #007bff;
  border-radius: 5px;
}
</style>
</head>
<body>

<div class="container">
  <h1>Fitness Tracker</h1>

  <!-- Input Form -->
  <div class="card">
    <h2>Log Activity</h2>
    <input type="number" id="steps" placeholder="Steps">
    <input type="text" id="workout" placeholder="Workout Type">
    <input type="number" id="duration" placeholder="Duration (mins)">
    <input type="number" id="calories" placeholder="Calories Burned">
    <button onclick="addEntry()">Add Entry</button>
  </div>

  <!-- Daily Summary -->
  <div class="card">
    <h2>Today's Summary</h2>
    <p>Steps: <span id="totalSteps">0</span></p>
    <p>Calories: <span id="totalCalories">0</span></p>
    <p>Workout Time: <span id="totalDuration">0</span> mins</p>

    <div class="progress">
      <label>Steps Goal (10,000)</label>
      <div class="bar">
        <div id="stepsBar"></div>
      </div>
    </div>

    <div class="progress">
      <label>Calories Goal (500)</label>
      <div class="bar">
        <div id="caloriesBar"></div>
      </div>
    </div>
  </div>

  <!-- Weekly Summary -->
  <div class="card">
    <h2>Weekly Summary</h2>
    <p>Total Steps: <span id="weeklySteps">0</span></p>
    <p>Total Calories: <span id="weeklyCalories">0</span></p>
  </div>

</div>

<script>
let data = JSON.parse(localStorage.getItem("fitnessData")) || [];

function addEntry() {
  const entry = {
    date: new Date().toLocaleDateString(),
    steps: +document.getElementById("steps").value || 0,
    workout: document.getElementById("workout").value,
    duration: +document.getElementById("duration").value || 0,
    calories: +document.getElementById("calories").value || 0
  };

  data.push(entry);
  localStorage.setItem("fitnessData", JSON.stringify(data));

  clearInputs();
  updateUI();
}

function clearInputs() {
  document.getElementById("steps").value = "";
  document.getElementById("workout").value = "";
  document.getElementById("duration").value = "";
  document.getElementById("calories").value = "";
}

function updateUI() {
  const today = new Date().toLocaleDateString();

  let totalSteps = 0;
  let totalCalories = 0;
  let totalDuration = 0;

  let weeklySteps = 0;
  let weeklyCalories = 0;

  data.forEach(entry => {
    if (entry.date === today) {
      totalSteps += entry.steps;
      totalCalories += entry.calories;
      totalDuration += entry.duration;
    }

    weeklySteps += entry.steps;
    weeklyCalories += entry.calories;
  });

  document.getElementById("totalSteps").textContent = totalSteps;
  document.getElementById("totalCalories").textContent = totalCalories;
  document.getElementById("totalDuration").textContent = totalDuration;

  document.getElementById("weeklySteps").textContent = weeklySteps;
  document.getElementById("weeklyCalories").textContent = weeklyCalories;

  document.getElementById("stepsBar").style.width =
    Math.min((totalSteps / 10000) * 100, 100) + "%";

  document.getElementById("caloriesBar").style.width =
    Math.min((totalCalories / 500) * 100, 100) + "%";
}

// Load data on start
updateUI();
</script>

</body>
</html>
